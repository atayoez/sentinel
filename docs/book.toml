[book]
title = "Sentinel"
description = "UAC-style PAM + polkit confirmation dialog for Linux"
authors = ["Atay Özcan"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/atayoez/sentinel"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/atayoez/sentinel/edit/main/docs/{path}"
site-url = "/sentinel/"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1
